# ── DeployBoard — Nginx Config ───────────────────────────────────────────────
#
# File: /etc/nginx/conf.d/deployboard.conf
#
# How it works:
#   - joytreehostingserver.dpdns.org         → DeployBoard dashboard (port 3001)
#   - *.joytreehostingserver.dpdns.org       → user sites (static OR server apps)
#
# For SERVER APPS:  DeployBoard auto-generates a per-subdomain config in
#                   /etc/nginx/conf.d/deployboard-apps/<subdomain>.conf
#                   that proxies to the pm2 port (4000, 4001, 4002…)
#
# For STATIC SITES: files served from /var/www/user-sites/<subdomain>/dist/
#
# Cloudflare wildcard A record: * → 35.205.83.73 covers all subdomains.
#
# ── IMPORTANT: After copying this file, run: ─────────────────────────────────
#   sudo mkdir -p /etc/nginx/conf.d/deployboard-apps
#   sudo nginx -t && sudo nginx -s reload

# ── DeployBoard dashboard ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name joytreehostingserver.dpdns.org www.joytreehostingserver.dpdns.org;

    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout  3600;
        proxy_send_timeout  3600;
    }
}

# ── Wildcard: all deployed user STATIC sites ──────────────────────────────────
server {
    listen 80;
    server_name ~^(?<subdomain>[a-z0-9][a-z0-9-]{0,61})\.joytreehostingserver\.dpdns\.org$;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json
               application/javascript application/xml+rss image/svg+xml;

    add_header X-Frame-Options       "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header Referrer-Policy       "strict-origin-when-cross-origin" always;

    location / {
        root  /var/www/user-sites/$subdomain/dist;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf|eot|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }

    error_page 404 = @not_deployed;
    location @not_deployed {
        proxy_pass http://127.0.0.1:3001;
    }
}

# ── Per-app proxy configs (auto-generated by DeployBoard for server apps) ─────
# Each deployed server app gets: /etc/nginx/conf.d/deployboard-apps/<subdomain>.conf
# Example content:
#   server { listen 80; server_name myapp.joytreehostingserver.dpdns.org;
#            location / { proxy_pass http://127.0.0.1:4000; ... } }
#
# Nginx prefers exact server_name matches over regex, so these take priority
# over the wildcard block above automatically.
include /etc/nginx/conf.d/deployboard-apps/*.conf;

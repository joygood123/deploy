# ── DeployBoard — Nginx Config (Docker Compose version) ──────────────────────
#
# IMPORTANT: This file is mounted INTO the nginx Docker container.
# Inside Docker network: the app service is at hostname "app" (not localhost).
# "app" is the Docker Compose service name defined in docker-compose.yml.
#
# Handles:
#   joytreehostingserver.dpdns.org     → DeployBoard dashboard (app:3001)
#   *.joytreehostingserver.dpdns.org   → User deployed static sites

# ── DeployBoard dashboard ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name joytreehostingserver.dpdns.org www.joytreehostingserver.dpdns.org;

    location / {
        # "app" = Docker Compose service name, port 3001
        proxy_pass         http://app:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout  3600;
        proxy_send_timeout  3600;
    }
}

# ── Wildcard: all deployed static user sites ──────────────────────────────────
# Nginx reads static files from the shared "sites-data" volume.
# The volume is mounted at /var/www/user-sites inside BOTH the app and nginx containers.
server {
    listen 80;
    server_name ~^(?<subdomain>[a-z0-9][a-z0-9-]{0,61})\.joytreehostingserver\.dpdns\.org$;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json
               application/javascript application/xml+rss image/svg+xml;

    add_header X-Frame-Options        "SAMEORIGIN"  always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    location / {
        root  /var/www/user-sites/$subdomain/dist;
        index index.html index.htm;

        # SPA fallback for React/Vue/Svelte client-side routing
        try_files $uri $uri/ /index.html;

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf|eot|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }

    # If no dist folder exists yet, proxy to dashboard (shows "not deployed" page)
    error_page 404 = @not_deployed;
    location @not_deployed {
        proxy_pass http://app:3001;
    }
}

# ── Server app proxy configs (auto-generated by DeployBoard) ──────────────────
# When a Node.js/server app is deployed, DeployBoard writes a per-subdomain
# config to /var/www/user-sites/_nginx-apps/<subdomain>.conf on the shared volume.
# This directory is mounted into the nginx container at /var/www/user-sites.
# We include all files from that directory so nginx picks them up automatically.
# After writing, DeployBoard sends: docker exec deployboard-nginx nginx -s reload
# The _nginx-apps directory is created automatically on first server app deploy.
# Using a glob include — nginx won't error if directory is empty since
# we create a placeholder file on startup.
include /var/www/user-sites/_nginx-apps/*.conf;

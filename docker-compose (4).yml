services:
  # ── DeployBoard Orchestrator ──────────────────────────────────────────────
  app:
    build: .
    container_name: deployboard
    restart: unless-stopped
    ports:
      - "3001:3001"
      # Node.js user apps get ports 4000-4099 — expose them so host nginx can proxy
      - "4000-4099:4000-4099"
    environment:
      - NODE_ENV=production
      - PORT=3001
      # RUNNER=local: builds run directly on the container (no Docker-in-Docker).
      # This works on any VPS. Change to "docker" only if you mount the Docker socket.
      - RUNNER=local
      - MONGODB_URI=mongodb://mongo:27017/deployboard
      # Sites dir is a named volume shared with the nginx container
      - SITES_DIR=/var/www/user-sites
      - TMP_DIR=/tmp/deployboard-builds
      # Set these in a .env file next to docker-compose.yml
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - BASE_DOMAIN=${BASE_DOMAIN:-joytreehostingserver.dpdns.org}
      - CF_WILDCARD_MODE=${CF_WILDCARD_MODE:-true}
      - CF_API_TOKEN=${CF_API_TOKEN:-}
      - CF_ZONE_ID=${CF_ZONE_ID:-}
      - CF_TUNNEL_ID=${CF_TUNNEL_ID:-}
      - CF_ACCOUNT_ID=${CF_ACCOUNT_ID:-}
    volumes:
      # Named volume shared with nginx — built sites go here, nginx serves them
      - sites-data:/var/www/user-sites
      # Tmp dir for cloning repos (cleaned after each build)
      - /tmp/deployboard-builds:/tmp/deployboard-builds
      # Uncomment to enable Docker-in-Docker build mode (RUNNER=docker):
      # - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - deployboard-net

  # ── MongoDB ───────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7-jammy
    container_name: deployboard-mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - deployboard-net

  # ── Nginx ─────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: deployboard-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Static sites from the shared volume (read-only for nginx)
      - sites-data:/var/www/user-sites:ro
      # Our nginx config (uses "app" as upstream — Docker service name)
      - ./nginx/deployboard.conf:/etc/nginx/conf.d/deployboard.conf:ro
      # Uncomment for SSL after running certbot:
      # - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app
    networks:
      - deployboard-net

volumes:
  sites-data:
  mongo-data:

networks:
  deployboard-net:
    driver: bridge

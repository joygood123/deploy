services:
  # ── DeployBoard Orchestrator ──────────────────────────────────────────────
  app:
    build: .
    container_name: deployboard
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      # RUNNER: use "local" for Cloud Shell / Render, "docker" for real VPS
      - RUNNER=local
      # MongoDB inside this compose network
      - MONGODB_URI=mongodb://mongo:27017/deployboard
      # /var/www/user-sites is writable because it is a named volume
      # owned by the deployboard user (uid 1001) set in the Dockerfile
      - SITES_DIR=/var/www/user-sites
      - TMP_DIR=/tmp/deployboard-builds
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - BASE_DOMAIN=${BASE_DOMAIN:-joytreehostingserver.dpdns.org}
    volumes:
      # Named volume — writeable by the app container (uid 1001)
      - sites-data:/var/www/user-sites
      # Bind-mount /tmp so builds survive restarts during testing
      - /tmp/deployboard-builds:/tmp/deployboard-builds
      # Uncomment ONLY when RUNNER=docker on a real VPS:
      # - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - deployboard-net

  # ── MongoDB ───────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7-jammy
    container_name: deployboard-mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - deployboard-net

  # ── Nginx (wildcard subdomain routing) ───────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: deployboard-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - sites-data:/var/www/user-sites:ro
      - ./nginx/deployboard.conf:/etc/nginx/conf.d/deployboard.conf:ro
      # Uncomment for SSL on a real VPS:
      # - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app
    networks:
      - deployboard-net

volumes:
  sites-data:
  mongo-data:

networks:
  deployboard-net:
    driver: bridge

# DeployBoard - Nginx config for bare VM with Cloudflare Tunnel
# File: /etc/nginx/conf.d/deployboard.conf

# DeployBoard dashboard
server {
    listen 80;
    server_name joytreehostingserver.dpdns.org www.joytreehostingserver.dpdns.org;

    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout  3600;
        proxy_send_timeout  3600;
    }
}

# Wildcard - all deployed user sites
# NOTE: Uses map module instead of regex capture in server_name
# because some nginx builds reject the (?<name>) syntax in server_name
server {
    listen 80;
    server_name ~^(.+)\.joytreehostingserver\.dpdns\.org$;

    set $subdomain $1;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json
               application/javascript application/xml+rss image/svg+xml;

    add_header X-Frame-Options        "SAMEORIGIN"  always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    location / {
        root  /var/www/user-sites/$subdomain/dist;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf|eot|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }

    error_page 404 = @not_deployed;
    location @not_deployed {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

# Per-app Node.js proxy configs (auto-generated by DeployBoard for server apps)
include /etc/nginx/conf.d/deployboard-apps/*.conf;

# ── DeployBoard — Nginx Config (Bare VM / Firebase Studio / Cloudflare Tunnel)
#
# This config is for running nginx DIRECTLY on the VM (not inside Docker).
# Uses localhost:3001 instead of "app:3001" (Docker-only hostname).
#
# Install: sudo cp this file to /etc/nginx/conf.d/deployboard.conf
# Test:    sudo nginx -t
# Reload:  sudo nginx -s reload

# ── DeployBoard dashboard ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name joytreehostingserver.dpdns.org www.joytreehostingserver.dpdns.org;

    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout  3600;
        proxy_send_timeout  3600;
    }
}

# ── Wildcard: all deployed sites ──────────────────────────────────────────────
server {
    listen 80;
    server_name ~^(?<subdomain>[a-z0-9][a-z0-9-]{0,61})\.joytreehostingserver\.dpdns\.org$;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json
               application/javascript application/xml+rss image/svg+xml;

    add_header X-Frame-Options        "SAMEORIGIN"  always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    location / {
        root  /var/www/user-sites/$subdomain/dist;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf|eot|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }

    error_page 404 = @not_deployed;
    location @not_deployed {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

# ── Per-app Node.js proxy configs (auto-generated by DeployBoard) ─────────────
include /etc/nginx/conf.d/deployboard-apps/*.conf;

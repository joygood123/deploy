# ── DeployBoard — Nginx Wildcard Subdomain Config ──────────────────
#
# Place this at:
#   /etc/nginx/sites-available/deployboard
# Then symlink:
#   sudo ln -s /etc/nginx/sites-available/deployboard /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Or with Docker Compose, it's mounted to /etc/nginx/conf.d/deployboard.conf
#
# IMPORTANT: Add a wildcard DNS A record in Cloudflare:
#   Name:   *
#   Value:  <your server IP>
#   Proxy:  On (orange cloud)

# ── Redirect www → bare domain ─────────────────────────────────────
server {
    listen 80;
    server_name www.deployboard.app;
    return 301 $scheme://deployboard.app$request_uri;
}

# ── Main dashboard ──────────────────────────────────────────────────
server {
    listen 80;
    server_name deployboard.app;

    location / {
        proxy_pass         http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host       $host;
        proxy_cache_bypass $http_upgrade;
    }
}

# ── Wildcard: each user site ────────────────────────────────────────
# Nginx regex captures the subdomain and maps it to the correct folder
server {
    listen 80;
    server_name ~^(?<subdomain>[a-z0-9][a-z0-9-]{0,61}[a-z0-9])\.deployboard\.app$;

    # Gzip for better performance
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_types      text/plain text/css text/xml application/json
                    application/javascript application/xml+rss
                    application/atom+xml image/svg+xml;

    # Security headers
    add_header X-Frame-Options       "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff"   always;
    add_header X-XSS-Protection      "1; mode=block" always;
    add_header Referrer-Policy       "strict-origin-when-cross-origin" always;

    location / {
        # $subdomain is captured from the server_name regex above
        root  /var/www/user-sites/$subdomain/dist;
        index index.html index.htm;

        # SPA fallback: if file doesn't exist, serve index.html
        # (handles client-side routing in React/Vue/Svelte apps)
        try_files $uri $uri/ /index.html;

        # Cache static assets aggressively
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf|eot)$ {
            expires     1y;
            add_header  Cache-Control "public, immutable";
        }

        # Don't cache index.html
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }

    # Custom 404 page (served from the site's own 404.html if it exists)
    error_page 404 /404.html;
    location = /404.html {
        root /var/www/user-sites/$subdomain/dist;
        internal;
    }
}

